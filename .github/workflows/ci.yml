name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · test · docs · MSRV
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned workspace toolchain
        uses: dtolnay/rust-toolchain@c1709d61444fb708e6ed87924f95626398d8d115 # 1.89.0
        with:
          components: rustfmt, clippy

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Verify exact-epoch secure deployment profile
        run: python3 scripts/secure_deployment.py check

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (workspace, all targets and features)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Check feature-isolated CLI graphs
        shell: bash
        run: |
          set -euo pipefail
          cargo check -p galadriel-cli --no-default-features --locked
          cargo check -p galadriel-cli --no-default-features --features pid --locked
          cargo check -p galadriel-cli --no-default-features --features ncp --locked
          cargo check -p galadriel-cli --no-default-features --features ncp-live --locked

          default_tree="$(cargo tree -p galadriel-cli --no-default-features -e normal --locked)"
          for forbidden in pid-core ncp-core ncp-zenoh zenoh tokio; do
            if [[ "$default_tree" == *"$forbidden v"* ]]; then
              echo "default CLI dependency graph unexpectedly contains $forbidden" >&2
              exit 1
            fi
          done

          pid_tree="$(cargo tree -p galadriel-cli --no-default-features --features pid -e normal --locked)"
          for forbidden in ncp-core ncp-zenoh zenoh tokio; do
            if [[ "$pid_tree" == *"$forbidden v"* ]]; then
              echo "pid-only CLI dependency graph unexpectedly contains $forbidden" >&2
              exit 1
            fi
          done

          ncp_tree="$(cargo tree -p galadriel-cli --no-default-features --features ncp -e normal --locked)"
          for forbidden in pid-core ncp-zenoh zenoh tokio; do
            if [[ "$ncp_tree" == *"$forbidden v"* ]]; then
              echo "ncp-only CLI dependency graph unexpectedly contains $forbidden" >&2
              exit 1
            fi
          done

      - name: Test (workspace, all features)
        run: cargo test --workspace --all-features --locked

      - name: Documentation (warnings denied)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --all-features --no-deps --locked

      - name: Pure-core smoke
        run: cargo build -p galadriel-core --no-default-features --locked

      - name: Assert vulnerable Zenoh compression path stays disabled
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$(date -u +%F)" > "2026-10-01" ]]; then
            echo 'RUSTSEC-2026-0041 exception expired; upgrade NCP/Zenoh or renew with review' >&2
            exit 1
          fi
          # Workspace-wide so no member's feature unification can smuggle the
          # vulnerable path in, and --locked so the assertion binds to the audited
          # dependency graph.
          feature_tree="$(cargo tree --workspace --all-features -e features --locked)"
          if [[ "$feature_tree" == *'zenoh-transport feature "transport_compression"'* ]]; then
            echo 'RUSTSEC-2026-0041 mitigation invalid: transport_compression is enabled' >&2
            exit 1
          fi

  current-stable:
    name: current stable · clippy · test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install current stable Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: clippy

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Clippy (workspace, all targets and features)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test (workspace, all features)
        run: cargo test --workspace --all-features --locked

  supply-chain:
    name: advisories · licenses · sources
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check dependency policy
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          rust-version: "1.89.0"
          arguments: --all-features --locked

      - name: Check fuzz-workspace dependency policy
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          rust-version: "1.89.0"
          manifest-path: fuzz/Cargo.toml
          arguments: --all-features --locked
