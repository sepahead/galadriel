name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTSEC_ADVISORY_DB_URL: https://github.com/RustSec/advisory-db
  RUSTSEC_ADVISORY_DB_COMMIT: f981d991604f3e7d4a0eb94e559cb3e5a94a6dc2
  RUSTSEC_ADVISORY_DB_TREE: 26bea0ac10667f826b5522a828a27861ae4b5287
  RUSTSEC_ADVISORY_DB_DIRECTORY: advisory-db-3157b0e258782691
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · test · docs · MSRV
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Capture exact subject identity
        env:
          EXPECTED_SUBJECT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          test "$(git rev-parse "HEAD^{commit}")" = "$EXPECTED_SUBJECT"
          git rev-parse "HEAD^{commit}"
          git rev-parse "HEAD^{tree}"

      - name: Install pinned workspace toolchain
        uses: dtolnay/rust-toolchain@c1709d61444fb708e6ed87924f95626398d8d115 # 1.89.0
        with:
          components: rustfmt, clippy

      - name: Install pinned public-API rustdoc toolchain
        uses: dtolnay/rust-toolchain@efcb852328a9f50117170cc43094fb6f09eaf1ae # nightly
        with:
          toolchain: nightly-2026-06-16

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Install pinned public-API tool
        env:
          RUSTFLAGS: ""
        run: cargo install cargo-public-api --version 0.52.0 --locked

      - name: Verify exact-epoch secure deployment profile
        run: python3 scripts/secure_deployment.py check

      - name: Verify release governance and review tooling
        run: >-
          python3 -m unittest -v
          scripts.tests.test_release_audit
          repo_work.tests.test_package_release_assets
          repo_work.tests.test_review_tools
          repo_work.tests.test_task_dispositions
          repo_work.tests.test_release_assurance
          repo_work.tests.test_finalize_qualification
          repo_work.tests.test_qualification_artifacts
          repo_work.tests.test_host_process_bounds

      - name: Verify generated release-audit artifacts
        run: |
          python3 repo_work/build_task_dispositions.py verify
          python3 repo_work/local_convergence.py schema --repo .
          python3 repo_work/freeze_audit_inputs.py verify-lifecycle \
            --repo . \
            --out release/0.9.0/audit/FROZEN-AUDIT-INPUTS-0.9.0.json \
            --allowed-signers release/0.9.0/audit/ALLOWED_SIGNERS
          python3 scripts/release_audit.py verify

      - name: Verify exact public API snapshots
        run: python3 repo_work/check_public_api.py

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (workspace, all targets and features)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Check feature-isolated CLI graphs
        run: |
          python3 repo_work/check_feature_graph.py
          cargo check -p galadriel-cli --no-default-features --locked
          cargo check -p galadriel-cli --no-default-features --features pid --locked
          cargo check -p galadriel-cli --no-default-features --features ncp --locked
          cargo check -p galadriel-cli --no-default-features --features ncp-live --locked

      - name: Test (workspace, all features)
        run: cargo test --workspace --all-features --locked

      - name: Documentation (warnings denied)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --all-features --no-deps --locked

      - name: Pure-core smoke
        run: cargo build -p galadriel-core --no-default-features --locked

      - name: Assert vulnerable Zenoh compression path stays disabled
        run: python3 repo_work/check_vulnerable_features.py

  current-stable:
    name: current stable · clippy · test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Capture exact subject identity
        env:
          EXPECTED_SUBJECT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          test "$(git rev-parse "HEAD^{commit}")" = "$EXPECTED_SUBJECT"
          git rev-parse "HEAD^{commit}"
          git rev-parse "HEAD^{tree}"

      - name: Install current stable Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.1
          components: clippy

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Clippy (workspace, all targets and features)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test (workspace, all features)
        run: cargo test --workspace --all-features --locked

  supply-chain:
    name: advisories · licenses · sources
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Capture exact subject identity
        env:
          EXPECTED_SUBJECT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          test "$(git rev-parse "HEAD^{commit}")" = "$EXPECTED_SUBJECT"
          git rev-parse "HEAD^{commit}"
          git rev-parse "HEAD^{tree}"

      - name: Install pinned workspace toolchain
        uses: dtolnay/rust-toolchain@c1709d61444fb708e6ed87924f95626398d8d115 # 1.89.0

      # Build from the checksummed crates.io source package. The otherwise
      # convenient Docker action downloads its cargo-deny binary without
      # authenticating the release-asset bytes.
      - name: Install pinned dependency-policy tool
        env:
          RUSTFLAGS: ""
        run: cargo install cargo-deny --version 0.19.9 --locked

      - name: Materialize locked dependency graphs
        run: |
          cargo fetch --locked
          cargo fetch --locked --manifest-path fuzz/Cargo.toml

      - name: Materialize pinned advisory database
        shell: bash
        env:
          GIT_CONFIG_GLOBAL: /dev/null
          GIT_CONFIG_NOSYSTEM: "1"
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -euo pipefail
          cargo_home="${CARGO_HOME:-$HOME/.cargo}"
          database_root="$cargo_home/advisory-dbs"
          database="$database_root/$RUSTSEC_ADVISORY_DB_DIRECTORY"
          test ! -e "$database"
          mkdir -p "$database_root"
          git init --quiet "$database"
          git -C "$database" config --local core.hooksPath /dev/null
          git -C "$database" remote add origin "$RUSTSEC_ADVISORY_DB_URL"
          git -C "$database" fetch --no-tags --depth=1 origin "$RUSTSEC_ADVISORY_DB_COMMIT"
          git -C "$database" checkout --detach --quiet FETCH_HEAD
          test "$(git -C "$database" rev-parse 'HEAD^{commit}')" = "$RUSTSEC_ADVISORY_DB_COMMIT"
          test "$(git -C "$database" rev-parse 'HEAD^{tree}')" = "$RUSTSEC_ADVISORY_DB_TREE"
          test "$(git -C "$database" remote get-url origin)" = "$RUSTSEC_ADVISORY_DB_URL"
          test -z "$(git -C "$database" status --porcelain=v1 --untracked-files=all)"
          git -C "$database" fsck --strict --no-progress

      - name: Check dependency policy
        run: cargo deny --offline --all-features --locked check

      - name: Check fuzz-workspace dependency policy
        run: cargo deny --offline --manifest-path fuzz/Cargo.toml --all-features --locked check --config fuzz/deny.toml
