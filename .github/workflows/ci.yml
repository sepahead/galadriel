name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (all targets)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (workspace)
        run: cargo test --workspace --all-features

      - name: Pure-core smoke (proves the default build stays heavy-dep-free)
        run: cargo build -p galadriel-core --no-default-features

  msrv:
    name: MSRV 1.80
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.80.0
      - uses: Swatinem/rust-cache@v2
      # Only the pure default members (core + sim + cli) hold the 1.80 MSRV; the
      # optional pid/ncp crates raise the union MSRV to 1.88 via pid-core/ncp-core.
      - name: Build the pure default members on the pinned MSRV
        run: cargo build
