[graph]
all-features = true

[advisories]
yanked = "deny"
unmaintained = "workspace"
unsound = "all"
ignore = [
    { id = "RUSTSEC-2026-0041", reason = "Owner: Galadriel maintainers. Expires: 2026-10-01. Zenoh 1.9 locks lz4_flex 0.10, but CI asserts transport_compression remains disabled; remove on NCP/Zenoh upgrade." },
    { crate = "spin@0.9.8", reason = "Owner: Galadriel maintainers. Expires: 2026-10-01. Exact NCP 0.8/Zenoh 1.9 transitively selects this yanked release; no RustSec advisory is attached. Remove on the reviewed NCP/Zenoh migration." },
    { crate = "spin@0.10.0", reason = "Owner: Galadriel maintainers. Expires: 2026-10-01. Exact NCP 0.8/Zenoh 1.9 transitively selects this yanked release; no RustSec advisory is attached. Remove on the reviewed NCP/Zenoh migration." },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/sepahead/NCP",
    "https://github.com/sepahead/pid-rs",
]
