[package]
name = "galadriel-ncp"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Versioned NCP sidecar ingest for Galadriel's Mirror (feature `ncp`)."
publish = false

[lints]
workspace = true

[dependencies]
galadriel-core = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
# ncp-core is light (serde + serde_json only); the workspace root pins the released
# NCP 0.7 crates by the exact public v0.7.1 commit.
ncp-core = { workspace = true }
# The live named-perception tap (feature `zenoh`) pulls the full Zenoh + tokio stack;
# the JSONL ingest path needs none of it, so it is strictly optional.
ncp-zenoh = { workspace = true, optional = true }

[features]
default = []
# The live Zenoh named-perception tap. Off by default — only `ncp-live` enables it.
zenoh = ["dep:ncp-zenoh"]
