[package]
name = "galadriel-ncp"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "NCP observation-plane ingest for Galadriel's Mirror (feature `ncp`)."

[dependencies]
galadriel-core = { workspace = true }
serde_json = { workspace = true }
# ncp-core is light (serde + serde_json only); pinned by git tag in the workspace root.
ncp-core = { workspace = true }
# The live Zenoh tap (feature `zenoh`) pulls the full Zenoh + tokio stack; the JSONL
# ingest path needs none of it, so it is strictly optional.
ncp-zenoh = { workspace = true, optional = true }

[features]
default = []
# The live Zenoh observation-plane tap. Off by default — only the `ncp-live` build enables it.
zenoh = ["dep:ncp-zenoh"]
