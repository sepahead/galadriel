[package]
name = "galadriel-ncp"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Versioned NCP sidecar ingest for Galadriel's Mirror (feature `ncp`)."
publish = false

[lints]
workspace = true

[dependencies]
galadriel-core = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
# ncp-core is light (serde + serde_json only); the workspace root pins the released
# NCP 0.7 crates by the exact public v0.7.1 commit.
ncp-core = { workspace = true }
# The live named-perception tap (feature `zenoh`) pulls the full Zenoh + tokio stack;
# the JSONL ingest path needs none of it, so it is strictly optional.
ncp-zenoh = { workspace = true, optional = true }
# Used directly for the bounded observation handoff; do not rely on ncp-zenoh's
# transitive runtime dependency.
tokio = { workspace = true, optional = true }

[dev-dependencies]
# tests/live_zenoh_e2e.rs (feature `zenoh`) drives a real in-process Zenoh round
# trip and needs a test runtime; the library itself keeps only tokio `sync`.
# Dev-only: the published/normal dependency tree is unchanged.
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }

[features]
default = []
# The live Zenoh named-perception tap. Off by default — only `ncp-live` enables it.
zenoh = ["dep:ncp-zenoh", "dep:tokio"]

# The live-leg e2e test compiles only when the `zenoh` feature is enabled
# (it needs ncp-zenoh and the optional tokio dependency in the lib itself).
[[test]]
name = "live_zenoh_e2e"
required-features = ["zenoh"]
