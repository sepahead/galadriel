[graph]
all-features = true

[advisories]
yanked = "deny"
unmaintained = "workspace"
unsound = "all"

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "MIT",
    "NCSA",
    "Unicode-3.0",
]
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/sepahead/NCP"]
