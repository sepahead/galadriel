handoff_schema: 1.0.0
project: Galadriel 1.0
repository: https://github.com/sepahead/galadriel
release_target: 1.0.0
execution_rule: Execute in ID order unless dependencies explicitly permit parallel work. Never close a task without its evidence.
ten_lenses:
- Correctness and invariants
- Safety and failure behavior
- Security and adversarial behavior
- Determinism and reproducibility
- Performance and bounded resources
- API, schema, and compatibility
- Observability and provenance
- Testing and independent evidence
- Documentation and operator usability
- Ecosystem composition and governance
tasks:
- id: T000
  phase: 1
  phase_title: Freeze claims, estimands, threat model and release identity
  title: Create an immutable audit manifest for every repository, toolchain, dataset and external paper used.
  priority: release_blocker
  dependencies: []
  primary_repository: https://github.com/sepahead/galadriel
  allowed_cross_repo_edits: Only when required for a claimed integration, conformance fixture, immutable pin, adapter, migration
    or truthful documentation. Do not redesign unrelated internals.
  procedure:
  - Read all files and tests relevant to 'Create an immutable audit manifest for every repository, toolchain, dataset and
    external paper used.' before editing.
  - Write or update a normative requirement with stable identifier and explicit SHALL/SHALL NOT language.
  - Implement the smallest coherent change that satisfies the requirement; remove contradictory legacy behavior.
  - Add positive, negative, boundary, adversarial and regression tests.
  - Generate retained machine-readable evidence tied to the exact commit and toolchain.
  - Update public documentation, migration notes and the requirement ledger.
  - Run the phase-specific and full repository gates; do not mark complete on prose or green compilation alone.
  required_tests:
  - unit or model-level tests
  - negative and malformed-input tests
  - boundary and state-transition tests
  - property or metamorphic tests where applicable
  - integration or clean-room reproduction appropriate to the claim
  required_evidence:
  - requirement ledger entry
  - test command and complete result
  - exact commit and dependency identities
  - generated vectors/reports/checksums where applicable
  - review record and residual-risk statement
  ten_lens_review:
    Correctness and invariants: Record findings, changes, evidence and unresolved risks.
    Safety and failure behavior: Record findings, changes, evidence and unresolved risks.
    Security and adversarial behavior: Record findings, changes, evidence and unresolved risks.
    Determinism and reproducibility: Record findings, changes, evidence and unresolved risks.
    Performance and bounded resources: Record findings, changes, evidence and unresolved risks.
    API, schema, and compatibility: Record findings, changes, evidence and unresolved risks.
    Observability and provenance: Record findings, changes, evidence and unresolved risks.
    Testing and independent evidence: Record findings, changes, evidence and unresolved risks.
    Documentation and operator usability: Record findings, changes, evidence and unresolved risks.
    Ecosystem composition and governance: Record findings, changes, evidence and unresolved risks.
  completion_rule: Complete only when every acceptance condition and evidence item is satisfied; otherwise leave OPEN or mark
    the unsupported claim NOT_CLAIMED.
